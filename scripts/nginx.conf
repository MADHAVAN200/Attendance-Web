##
## MANO Attendance – Nginx Site Configuration
## Place this at /etc/nginx/sites-available/attendance and symlink to sites-enabled/
## This config serves the static frontend build AND reverse-proxies the backend API
## and WebSocket (Socket.IO) traffic to the Node.js PM2 process.
##

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name attendance.mano.co.in www.attendance.mano.co.in;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name attendance.mano.co.in www.attendance.mano.co.in;

    # ─── SSL Certificate (managed by Certbot / Let's Encrypt) ────────────────
    ssl_certificate     /etc/letsencrypt/live/attendance.mano.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance.mano.co.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ─── Static Frontend (React / Vite build) ────────────────────────────────
    root  /var/www/attendance;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── REST API proxy → Node.js backend ────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://127.0.0.1:5002/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;
    }

    # ─── WebSocket / Socket.IO proxy → Node.js backend ───────────────────────
    # CRITICAL: The Upgrade and Connection headers MUST be set for WebSocket
    # connections to work. Without these, Socket.IO falls back to long-polling
    # and messages only appear after a full page reload.
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5002/socket.io/;
        proxy_http_version 1.1;

        # WebSocket upgrade handshake headers
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive longer than regular HTTP
        proxy_read_timeout  86400s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  86400s;

        # Disable proxy buffering for real-time streaming
        proxy_buffering    off;
    }

    # ─── Gzip compression for static assets ──────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
